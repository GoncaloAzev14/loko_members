<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <ion-icon name="people-circle-outline"></ion-icon>
    </div>
    <h1 class="auth-title">{{ i18n.t('signup.title') }}</h1>
    <p class="auth-subtitle">{{ i18n.t('signup.subtitle') }}</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>{{ i18n.t('signup.name') }}</label>
        <input type="text" [(ngModel)]="name" name="name" required [placeholder]="i18n.t('signup.namePlaceholder')" autocomplete="name" />
      </div>

      <div class="form-group">
        <label>{{ i18n.t('login.email') }}</label>
        <input type="email" [(ngModel)]="email" name="email" required [placeholder]="i18n.t('signup.emailPlaceholder')" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>{{ i18n.t('login.password') }}</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          [placeholder]="i18n.t('signup.passwordPlaceholder')"
          autocomplete="new-password"
        />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { <span>{{ i18n.t('signup.submitting') }}</span> } @else { <span>{{ i18n.t('signup.submit') }}</span> }
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/login">{{ i18n.t('signup.hasAccount') }}</a>
    </p>
  </div>
</div>
