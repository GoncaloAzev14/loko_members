  <meta name="description" content="Club membership and dues management">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Loko Members">
  <script>
    // Decode GitHub Pages 404.html SPA redirect
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded[1] ? '?' + decoded[1] : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script type="module" src="ionicons/ionicons.esm.js"></script>
  <script nomodule src="ionicons/ionicons.js"></script>
</head>

</body>
