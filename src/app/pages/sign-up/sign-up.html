<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <ion-icon name="people-circle-outline"></ion-icon>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join Loko Members</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" required placeholder="Your name" autocomplete="name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Min. 6 characters"
          autocomplete="new-password"
        />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { <span>Creating…</span> } @else { <span>Create Account</span> }
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
