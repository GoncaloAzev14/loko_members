<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <ion-icon name="people-circle-outline"></ion-icon>
    </div>
    <h1 class="auth-title">{{ i18n.t('forgotPassword.title') }}</h1>
    <p class="auth-subtitle">{{ i18n.t('forgotPassword.subtitle') }}</p>

    @if (sent()) {
      <p class="success-msg">{{ i18n.t('forgotPassword.sentMessage') }}</p>
    } @else {
      <form (ngSubmit)="onSubmit()" #f="ngForm" class="auth-form">
        <div class="form-group">
          <label>{{ i18n.t('forgotPassword.email') }}</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            [placeholder]="i18n.t('forgotPassword.emailPlaceholder')"
            autocomplete="email"
          />
        </div>

        @if (error()) {
          <p class="error-msg">{{ error() }}</p>
        }

        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) {
            <span>{{ i18n.t('forgotPassword.submitting') }}</span>
          } @else {
            <span>{{ i18n.t('forgotPassword.submit') }}</span>
          }
        </button>
      </form>
    }

    <p class="auth-footer">
      <a routerLink="/login">{{ i18n.t('forgotPassword.backToLogin') }}</a>
    </p>
  </div>
</div>
