<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <ion-icon name="people-circle-outline"></ion-icon>
    </div>
    <h1 class="auth-title">{{ i18n.t('login.title') }}</h1>
    <p class="auth-subtitle">{{ i18n.t('login.subtitle') }}</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" class="auth-form">
      <div class="form-group">
        <label>{{ i18n.t('login.email') }}</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          [placeholder]="i18n.t('login.emailPlaceholder')"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label>{{ i18n.t('login.password') }}</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          [placeholder]="i18n.t('login.passwordPlaceholder')"
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span>{{ i18n.t('login.submitting') }}</span>
        } @else {
          <span>{{ i18n.t('login.submit') }}</span>
        }
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/forgot-password">{{ i18n.t('login.forgotPassword') }}</a>
    </p>

    <p class="auth-footer">
      {{ i18n.t('login.noAccount').split('?')[0] }}? <a routerLink="/signup">{{ i18n.t('login.noAccount').split('? ')[1] }}</a>
    </p>
  </div>
</div>
