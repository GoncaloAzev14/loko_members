<div class="app-layout" [class.no-nav]="!clubService.clubId()">
  <header class="top-bar">
    @if (clubService.clubId()) {
      <div class="club-switcher" [class.open]="dropdownOpen()">
        <button class="club-trigger" (click)="dropdownOpen.update(v => !v)">
          {{ clubService.club()?.name }}
          <ion-icon name="chevron-down-outline" class="chevron"></ion-icon>
        </button>
        @if (dropdownOpen()) {
          <div class="club-dropdown">
            @for (c of clubService.clubs(); track c.id) {
              <button class="dropdown-item" [class.active]="c.id === clubService.clubId()" (click)="selectClub(c.id)">
                <span class="item-avatar">{{ c.name.charAt(0).toUpperCase() }}</span>
                <span class="item-name">{{ c.name }}</span>
                @if (c.id === clubService.clubId()) {
                  <ion-icon name="checkmark-outline" class="check-icon"></ion-icon>
                }
              </button>
            }
            <div class="dropdown-divider"></div>
            <button class="dropdown-item home-item" (click)="goHome()">
              <ion-icon name="add-circle-outline" class="item-icon"></ion-icon>
              <span class="item-name">{{ i18n.t('shell.joinOrCreate') }}</span>
            </button>
          </div>
          <div class="dropdown-backdrop" (click)="dropdownOpen.set(false)"></div>
        }
      </div>
    } @else {
      <span class="app-name">{{ i18n.t('shell.appName') }}</span>
    }
    <button class="sign-out-btn" (click)="auth.signOut()" title="Sign out">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </header>

  <main class="page-content">
    <router-outlet />
  </main>

  @if (clubService.clubId()) {
    <nav class="bottom-nav">
      <div class="nav-indicator" [style.transform]="'translate(' + (activeTabIndex() * 100) + '%, 0)'"></div>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <ion-icon name="grid-outline" class="inactive-icon"></ion-icon>
        <ion-icon name="grid" class="active-icon"></ion-icon>
        <span>{{ i18n.t('shell.dashboard') }}</span>
      </a>
      <a routerLink="/members" routerLinkActive="active" class="nav-item">
        <ion-icon name="people-outline" class="inactive-icon"></ion-icon>
        <ion-icon name="people" class="active-icon"></ion-icon>
        <span>{{ i18n.t('shell.members') }}</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-item">
        <ion-icon name="settings-outline" class="inactive-icon"></ion-icon>
        <ion-icon name="settings" class="active-icon"></ion-icon>
        <span>{{ i18n.t('shell.settings') }}</span>
      </a>
    </nav>
  }
</div>
